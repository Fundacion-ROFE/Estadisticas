<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistencia — ROFÉ Jóvenes creaTIvos</title>
  <style>
    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --green:      #22c55e;
      --green-bg:   rgba(21,128,61,0.13);
      --red:        #ef4444;
      --red-bg:     rgba(220,38,38,0.13);
      --yellow:     #f59e0b;
      --accent:     #6366f1;
      --text:       #f1f5f9;
      --muted:      #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .brand { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
    .brand-rofe { color: var(--accent); }
    .header-meta { flex: 1; min-width: 0; }
    .header-segment { font-size: 0.82rem; color: var(--muted); }
    .header-update  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 10px;
      border-radius: 4px; white-space: nowrap;
    }
    .badge-live   { background: var(--green-bg); color: var(--green); }
    .badge-recent { background: rgba(99,102,241,0.13); color: var(--accent); }
    .badge-live .dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 56px; }

    .section-gap { margin-top: 28px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }
    .card-title {
      font-size: 0.82rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); margin-bottom: 20px;
    }

    /* ── KPIs ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .kpi-value { font-size: 2.2rem; font-weight: 700; line-height: 1; color: var(--text); }
    .kpi-label { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-top: 8px; }
    .kpi-sub   { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

    /* ── Bar chart ── */
    .bar-chart { display: flex; flex-direction: column; gap: 12px; }
    .bar-row { display: grid; grid-template-columns: 220px 1fr 44px; align-items: center; gap: 12px; }
    .bar-label { font-size: 0.83rem; color: var(--text); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track {
      background: var(--border);
      border-radius: 4px;
      height: 26px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      width: 0;
    }
    .bar-count { font-size: 0.83rem; color: var(--muted); font-variant-numeric: tabular-nums; text-align: right; }
    .chart-note { font-size: 0.78rem; color: var(--muted); margin-top: 16px; }
    .chart-note strong { color: var(--text); }

    /* ── Heatmap ── */
    .table-scroll { overflow-x: auto; }
    .heatmap { border-collapse: collapse; width: 100%; min-width: 500px; }
    .heatmap th, .heatmap td { padding: 6px 8px; font-size: 0.78rem; border: 1px solid var(--border); }
    .th-name  { text-align: left; min-width: 160px; color: var(--muted); font-weight: 600; background: var(--bg); }
    .th-ses   { text-align: center; max-width: 80px; color: var(--muted); font-weight: 600; background: var(--bg); white-space: nowrap; }
    .th-total { text-align: center; color: var(--muted); font-weight: 600; background: var(--bg); }
    .cell-name    { color: var(--text); white-space: nowrap; }
    .cell-present { text-align: center; background: var(--green-bg); color: var(--green); font-size: 0.85rem; font-weight: 700; }
    .cell-absent  { background: var(--bg); }
    .cell-count   { text-align: center; color: var(--muted); font-size: 0.78rem; }
    .tf-label { color: var(--muted); font-size: 0.75rem; text-align: right; }
    .tf-count { text-align: center; color: var(--accent); font-weight: 700; font-size: 0.78rem; }
    .btn-ver-todos {
      margin-top: 14px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.8rem;
      padding: 6px 14px; border-radius: 4px;
      cursor: pointer;
    }
    .btn-ver-todos:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Search ── */
    .search-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-results { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .result-name { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .result-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 10px; }
    .result-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 0.72rem; padding: 3px 8px;
      border-radius: 4px; white-space: nowrap;
    }
    .chip-green { background: var(--green-bg); color: var(--green); }
    .chip-gray  { background: var(--border); color: var(--muted); }
    .no-results { font-size: 0.85rem; color: var(--muted); }

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Footer ── */
    footer { text-align: center; padding: 32px 24px 16px; font-size: 0.78rem; color: var(--muted); }

    /* ── Error ── */
    .error-box {
      background: var(--red-bg); border: 1px solid var(--red);
      border-radius: 8px; padding: 20px 24px; margin: 40px auto;
      max-width: 500px; color: var(--red);
    }
    .error-box strong { display: block; margin-bottom: 6px; font-size: 1rem; }
    .error-box small { color: var(--muted); font-size: 0.8rem; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      header { padding: 14px 16px; }
      main   { padding: 16px 12px 40px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .bar-row  { grid-template-columns: 100px 1fr 36px; }
      .bar-label { font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<div id="root">
  <!-- Skeleton de carga -->
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:20px 32px;height:68px"></div>
  <div style="max-width:1100px;margin:28px auto;padding:0 24px">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
      <div class="skel" style="height:90px"></div>
      <div class="skel" style="height:90px"></div>
      <div class="skel" style="height:90px"></div>
      <div class="skel" style="height:90px"></div>
    </div>
    <div class="skel" style="height:220px;margin-top:28px"></div>
    <div class="skel" style="height:300px;margin-top:28px"></div>
  </div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function abbrev(s, max) {
  s = String(s || '');
  return s.length > max ? s.substring(0, max) + '…' : s;
}
function fmtTs(iso) {
  try {
    const d = new Date(iso);
    return 'Actualizado el ' + d.toLocaleDateString('es-CO', {year:'numeric',month:'long',day:'numeric'})
      + ', ' + d.toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
  } catch { return iso || ''; }
}
function esHoy(iso) {
  try { return new Date(iso).toDateString() === new Date().toDateString(); } catch { return false; }
}

// ── Construir mapa de estudiantes únicos ──────────────────────────────────────
function buildEstudiantesMap(data) {
  const map = new Map();
  data.sesiones.forEach((s, si) => {
    (s.estudiantes || []).forEach(e => {
      const key = e.identificacion || e.correo || e.nombre;
      if (!map.has(key)) {
        map.set(key, {
          nombre: esc(e.nombre || ''),
          identificacion: esc(e.identificacion || ''),
          correo: esc(e.correo || ''),
          celular: esc(e.celular || ''),
          sesiones: new Set()
        });
      }
      map.get(key).sesiones.add(si);
    });
  });
  return map;
}

// ── Render: Header ────────────────────────────────────────────────────────────
function renderHeader(data) {
  const vivo = esHoy(data.ultima_actualizacion);
  return `
  <header>
    <div class="brand"><span class="brand-rofe">ROFÉ</span> · Jóvenes creaTIvos</div>
    <div class="header-meta">
      <div class="header-segment">${esc(data.segmento || '')}</div>
      <div class="header-update">${fmtTs(data.ultima_actualizacion)}</div>
    </div>
    <div class="status-badge ${vivo ? 'badge-live' : 'badge-recent'}">
      <span class="dot">●</span> ${vivo ? 'EN VIVO' : 'DATOS DEL DÍA'}
    </div>
  </header>`;
}

// ── Render: KPIs ──────────────────────────────────────────────────────────────
function renderKPIs(t) {
  const items = [
    { v: t.total_sesiones                       ?? '—', l: 'Sesiones',              s: 'Total realizadas' },
    { v: t.estudiantes_unicos_id                ?? '—', l: 'Estudiantes únicos',    s: 'Por número de ID' },
    { v: (t.porcentaje_retencion ?? '—') + (t.porcentaje_retencion != null ? '%' : ''),
                                                       l: 'Retención',              s: 'Primera → última sesión' },
    { v: (t.promedio_sesiones_por_estudiante ?? '—').toString(),
                                                       l: 'Sesiones promedio',      s: 'Por estudiante' },
  ];
  return `<div class="kpi-grid">${items.map(k => `
    <div class="kpi-card">
      <div class="kpi-value">${esc(String(k.v))}</div>
      <div class="kpi-label">${k.l}</div>
      <div class="kpi-sub">${k.s}</div>
    </div>`).join('')}</div>`;
}

// ── Render: Bar chart ─────────────────────────────────────────────────────────
function renderBarChart(data) {
  const vals    = data.sesiones.map(s => s.asistentes || 0);
  const maxVal  = Math.max(...vals, 1);
  const maxNom  = data.totales?.sesion_max?.nombre;
  const minNom  = data.totales?.sesion_min?.nombre;

  const bars = data.sesiones.map((s, i) => {
    const pct = ((s.asistentes || 0) / maxVal * 100).toFixed(1);
    const color = s.nombre === maxNom ? 'var(--green)'
                : s.nombre === minNom ? 'var(--red)'
                : 'var(--accent)';
    return `
    <div class="bar-row">
      <div class="bar-label" title="${esc(s.nombre)}">${esc(s.nombre)}</div>
      <div class="bar-track">
        <div class="bar-fill"
          data-w="${pct}%"
          style="background:${color};transition:width .6s ease ${i*100}ms"></div>
      </div>
      <div class="bar-count">${s.asistentes ?? '—'}</div>
    </div>`;
  }).join('');

  return `
  <div class="card section-gap">
    <div class="card-title">Asistencia por sesión</div>
    <div class="bar-chart">${bars}</div>
    <p class="chart-note">
      Más asistentes: <strong>${esc(maxNom || '—')}</strong> &nbsp;·&nbsp;
      Menos asistentes: <strong>${esc(minNom || '—')}</strong>
    </p>
  </div>`;
}

// ── Render: Heatmap ───────────────────────────────────────────────────────────
const HEATMAP_LIMIT = 30;
let _heatmapShowAll = false;

function renderHeatmap(data) {
  const map = buildEstudiantesMap(data);
  const todos = [...map.values()].sort((a, b) => b.sesiones.size - a.sesiones.size);
  const total = todos.length;

  if (total === 0) {
    return `<div class="card section-gap"><div class="card-title">Retención por estudiante</div>
      <p style="color:var(--muted);font-size:.85rem">Sin datos de estudiantes en las sesiones de muestra.</p></div>`;
  }

  const mostrar = _heatmapShowAll || total <= HEATMAP_LIMIT ? todos : todos.slice(0, HEATMAP_LIMIT);
  const headers = data.sesiones.map(s => abbrev(s.nombre, 12));

  const filas = mostrar.map(e => {
    const celdas = data.sesiones.map((_, si) =>
      e.sesiones.has(si)
        ? `<td class="cell-present" title="Asistió">✓</td>`
        : `<td class="cell-absent"></td>`
    ).join('');
    return `<tr>
      <td class="cell-name">${e.nombre}</td>
      ${celdas}
      <td class="cell-count">${e.sesiones.size}/${data.sesiones.length}</td>
    </tr>`;
  }).join('');

  const pie = data.sesiones.map(s =>
    `<td class="tf-count">${s.asistentes ?? '—'}</td>`
  ).join('');

  const btnVerTodos = total > HEATMAP_LIMIT && !_heatmapShowAll
    ? `<button class="btn-ver-todos" onclick="toggleHeatmap()">Ver todos (${total})</button>`
    : '';

  return `
  <div class="card section-gap" id="heatmap-section">
    <div class="card-title">Retención por estudiante · muestra ${mostrar.length}${total > HEATMAP_LIMIT && !_heatmapShowAll ? ` de ${total}` : ''}</div>
    <div class="table-scroll">
      <table class="heatmap">
        <thead><tr>
          <th class="th-name">Estudiante</th>
          ${headers.map((h,i) => `<th class="th-ses" title="${esc(data.sesiones[i].nombre)}">${esc(h)}</th>`).join('')}
          <th class="th-total">Total</th>
        </tr></thead>
        <tbody>${filas}</tbody>
        <tfoot><tr>
          <td class="tf-label">Registros totales</td>
          ${pie}
          <td></td>
        </tr></tfoot>
      </table>
    </div>
    ${btnVerTodos}
  </div>`;
}

function toggleHeatmap() {
  _heatmapShowAll = true;
  document.getElementById('heatmap-section').outerHTML = renderHeatmap(window._data);
}

// ── Render: Search ────────────────────────────────────────────────────────────
function renderSearch() {
  return `
  <div class="card section-gap">
    <div class="card-title">Buscar estudiante</div>
    <input id="search-input" class="search-input" type="text"
      placeholder="Buscar por nombre o identificación…"
      oninput="onSearch(this.value)" autocomplete="off" />
    <div id="search-results" class="search-results"></div>
  </div>`;
}

function onSearch(q) {
  const container = document.getElementById('search-results');
  q = q.trim().toLowerCase();
  if (!q) { container.innerHTML = ''; return; }

  const data = window._data;
  const map  = new Map();

  data.sesiones.forEach((s, si) => {
    (s.estudiantes || []).forEach(e => {
      const matchNombre = (e.nombre || '').toLowerCase().includes(q);
      const matchId     = (e.identificacion || '').includes(q);
      if (!matchNombre && !matchId) return;
      const key = e.identificacion || e.nombre;
      if (!map.has(key)) map.set(key, {...e, _sesiones: []});
      map.get(key)._sesiones.push(si);
    });
  });

  if (map.size === 0) {
    container.innerHTML = '<p class="no-results">Sin resultados para esta búsqueda</p>';
    return;
  }

  const cards = [...map.values()].map(e => {
    const sesSet = new Set(e._sesiones);
    const chips  = data.sesiones.map((s, si) =>
      `<span class="chip ${sesSet.has(si) ? 'chip-green' : 'chip-gray'}">${esc(abbrev(s.nombre, 10))}</span>`
    ).join('');
    return `
    <div class="result-card">
      <div class="result-name">${esc(e.nombre || '—')}</div>
      <div class="result-meta">
        ID: ${esc(e.identificacion || '—')} &nbsp;·&nbsp;
        ${esc(e.correo || '—')} &nbsp;·&nbsp;
        ${esc(e.celular || '—')}
      </div>
      <div class="result-chips">${chips}</div>
    </div>`;
  }).join('');

  container.innerHTML = cards;
}

// ── Render: Footer ────────────────────────────────────────────────────────────
function renderFooter(data) {
  return `<footer>
    Generado automáticamente desde Google Sheets · Segmento: ${esc(data.segmento || '—')}
  </footer>`;
}

// ── Animación de barras ───────────────────────────────────────────────────────
function animateBars() {
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
        el.style.width = el.dataset.w;
      });
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="error-box">
      <strong>No se pudieron cargar los datos</strong>
      ${esc(msg)}<br>
      <small>Verifica que data.json existe en la misma carpeta que index.html.</small>
    </div>`;
}

fetch('./data.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    window._data = data;
    document.getElementById('root').innerHTML =
      renderHeader(data) +
      `<main>
        ${renderKPIs(data.totales || {})}
        ${renderBarChart(data)}
        ${renderHeatmap(data)}
        ${renderSearch()}
      </main>` +
      renderFooter(data);
    animateBars();
  })
  .catch(err => showError(err.message));
</script>
</body>
</html>
