<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Jóvenes creaTIvos · Fundación ROFÉ</title>
  <link rel="icon" href="../img/logo_rofe_aplicacion2.png" type="image/png">
  <style>
    /* ── Variables de marca ── */
    :root {
      --primary:    #406C9E;
      --primary-bg: rgba(64,108,158,0.10);
      --yellow:     #EEC935;
      --yellow-bg:  rgba(238,201,53,0.14);
      --orange:     #D1793F;
      --orange-bg:  rgba(209,121,63,0.12);
      --red:        #C12D4C;
      --red-bg:     rgba(193,45,76,0.10);
      --green:      #6EA050;
      --green-bg:   rgba(110,160,80,0.12);
      --blue-light: #6FA0BC;
      --celeste:    #83B6DD;

      /* UI */
      --bg:         #FFFFFF;
      --surface:    #F4F7FB;
      --border:     #DDE4ED;
      --text:       #1A2535;
      --muted:      #6B7A94;

      /* Aliases usados en el JS con var() inline */
      --accent:     #406C9E;
      --accent-bg:  rgba(64,108,158,0.10);
      --blue:       #406C9E;
      --blue-bg:    rgba(64,108,158,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Gilroy', 'Century Gothic', 'Trebuchet MS', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      border-bottom: 3px solid var(--primary);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .header-logo {
      height: 54px;
      width: auto;
      flex-shrink: 0;
      object-fit: contain;
    }
    .brand-block     { flex-shrink: 0; }
    .brand-name      { font-size: 1rem; font-weight: 700; color: var(--primary); letter-spacing: .01em; }
    .brand-creat     { color: var(--orange); }
    .brand-eslogan   { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-style: italic; }
    .hd-meta         { flex: 1; min-width: 0; }
    .hd-seg          { font-size: 0.8rem; color: var(--text); font-weight: 600; }
    .hd-upd          { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .status-badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: 4px 10px; border-radius: 4px;
    }
    .badge-live   { background: var(--green-bg);  color: var(--green); }
    .badge-recent { background: var(--primary-bg); color: var(--primary); }
    .badge-live .dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      font-family: inherit;
      font-size: 0.85rem; font-weight: 600; padding: 12px 20px;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn:hover  { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 56px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .gap { margin-top: 24px; }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 1px 4px rgba(64,108,158,0.07);
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--primary); margin-bottom: 18px;
    }

    /* ── KPIs ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 18px;
      border-top: 3px solid var(--primary);
    }
    .kpi-val { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--primary); }
    .kpi-lbl { font-size: 0.8rem; font-weight: 600; margin-top: 7px; color: var(--text); }
    .kpi-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    /* ── Semáforo ── */
    .sem-green  { color: var(--green); }
    .sem-yellow { color: #B89500; }
    .sem-red    { color: var(--red); }
    .tag {
      display: inline-block; font-size: .7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .tag-green  { background: var(--green-bg);    color: var(--green); }
    .tag-yellow { background: var(--yellow-bg);   color: #8A6E00; }
    .tag-red    { background: var(--red-bg);      color: var(--red); }
    .tag-blue   { background: var(--blue-bg);     color: var(--blue); }
    .tag-orange { background: var(--orange-bg);   color: var(--orange); }

    /* ── Tabla ── */
    .dt { width: 100%; border-collapse: collapse; }
    .dt thead tr { background: var(--primary); }
    .dt th {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: #FFFFFF; padding: 10px 12px;
      text-align: left;
    }
    .dt td { font-size: .85rem; padding: 9px 12px; border-bottom: 1px solid var(--border); }
    .dt tr:last-child td { border-bottom: none; }
    .dt tbody tr:nth-child(even) td { background: rgba(64,108,158,0.04); }
    .dt tbody tr:hover td { background: rgba(64,108,158,0.08); }
    .td-r { text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Barras de progreso ── */
    .bar-row { display: grid; grid-template-columns: 200px 1fr 50px; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-lbl  { font-size: .82rem; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { background: var(--border); border-radius: 4px; height: 24px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; width: 0; }
    .bar-cnt   { font-size: .82rem; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Scorecards anomalías ── */
    .anom-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .anom-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: 8px; padding: 18px;
    }
    .anom-val  { font-size: 2rem; font-weight: 700; color: var(--red); }
    .anom-lbl  { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text); margin-top: 6px; }
    .anom-desc { font-size: .75rem; color: var(--muted); margin-top: 4px; }

    /* ── Tab 3: dos columnas ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .col-blue   { border-left: 4px solid var(--primary); }
    .col-orange { border-left: 4px solid var(--orange); }
    .stat-row   { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-lbl { font-size: .82rem; color: var(--muted); }
    .stat-val { font-size: 1rem; font-weight: 700; }

    .metrics-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .metric-card  {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
    }
    .metric-val   { font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .metric-lbl   { font-size: .78rem; color: var(--muted); margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }

    .compare-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
    .compare-item { text-align: center; padding: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .compare-big  { font-size: 2.2rem; font-weight: 700; }
    .compare-lbl  { font-size: .78rem; color: var(--muted); margin-top: 6px; }

    /* ── Info / Nota ── */
    .info-box {
      background: var(--primary-bg);
      border: 1px solid var(--primary);
      border-radius: 8px; padding: 14px 18px; font-size: .82rem; color: var(--muted);
    }
    .info-box strong { color: var(--primary); }
    .chart-note { font-size: .76rem; color: var(--muted); margin-top: 14px; }
    .chart-note strong { color: var(--text); }

    /* ── Skeleton / Error ── */
    .skel {
      background: linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);
      background-size: 200% 100%; animation: shim 1.5s infinite; border-radius: 4px;
    }
    @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .error-box {
      background: var(--red-bg); border: 1px solid var(--red);
      border-radius: 8px; padding: 18px 22px; color: var(--red); margin-top: 24px;
    }
    .error-box strong { display: block; margin-bottom: 4px; }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 3px solid var(--primary);
      text-align: center;
      padding: 28px 16px 24px;
    }
    .footer-logo   { height: 44px; width: auto; object-fit: contain; margin-bottom: 10px; }
    .footer-eslogan {
      font-size: .85rem; font-weight: 700; color: var(--primary);
      letter-spacing: .04em; margin-bottom: 4px;
    }
    .footer-mision {
      font-size: .8rem; font-style: italic; color: var(--muted);
      margin-bottom: 12px;
    }
    .footer-copy { font-size: .72rem; color: var(--muted); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      header        { padding: 12px 14px; }
      .header-logo  { height: 40px; }
      .tabs         { padding: 0 8px; }
      .tab-btn      { padding: 10px 12px; font-size: .78rem; }
      main          { padding: 16px 12px 40px; }
      .kpi-grid     { grid-template-columns: 1fr 1fr; }
      .anom-grid    { grid-template-columns: 1fr; }
      .two-col      { grid-template-columns: 1fr; }
      .metrics-grid { grid-template-columns: 1fr 1fr; }
      .compare-row  { grid-template-columns: 1fr; }
      .bar-row      { grid-template-columns: 110px 1fr 40px; }
    }
  </style>
</head>
<body>

<!-- Header — con logo e identidad visual -->
<div id="header-root">
  <div style="height:72px;background:var(--bg);border-bottom:3px solid var(--primary)"></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('t1',this)">Estadísticas Q10</button>
  <button class="tab-btn"        onclick="switchTab('t2',this)">Avance Manual</button>
  <button class="tab-btn"        onclick="switchTab('t3',this)">Comparativo</button>
  <button class="tab-btn"        onclick="switchTab('t4',this)">Admin</button>
  <button class="tab-btn"        onclick="switchTab('t5',this)">📈 Tendencia</button>
  <a href="../retirados/" style="margin-left:auto;align-self:center;display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;color:var(--orange);text-decoration:none;padding:6px 14px;border-radius:20px;border:1px solid var(--orange-bg);background:var(--orange-bg);white-space:nowrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
    Retirados ↗
  </a>
  <a href="../mujeres-rofe/" style="margin-left:10px;align-self:center;display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;color:var(--red);text-decoration:none;padding:6px 14px;border-radius:20px;border:1px solid var(--red-bg);background:var(--red-bg);white-space:nowrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.74 1.54 5.12 3.8 6.38V18h6.4v-2.62C17.46 14.12 19 11.74 19 9c0-3.87-3.13-7-7-7zm2.4 14H9.6v-1h4.8v1zM9.6 18h4.8v1H9.6v-1zm2.4 3c.55 0 1-.45 1-1h-2c0 .55.45 1 1 1z"/></svg>
    Mujeres ROFÉ ↗
  </a>
</div>

<main>
  <!-- Skeleton inicial -->
  <div id="loading">
    <div class="skel" style="height:100px;margin-bottom:14px"></div>
    <div class="skel" style="height:220px;margin-bottom:14px"></div>
    <div class="skel" style="height:160px"></div>
  </div>

  <div id="t1" class="tab-panel"></div>
  <div id="t2" class="tab-panel"></div>
  <div id="t3" class="tab-panel"></div>
  <div id="t4" class="tab-panel"></div>
  <div id="t5" class="tab-panel"></div>
</main>

<div id="footer-root"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── Utilidades ────────────────────────────────────────────────────────────────
function esc(s){ return String(s??'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return n!=null ? Number(n).toLocaleString('es-CO') : '—'; }
function fmtPct(n){ return n!=null ? Number(n).toFixed(1)+'%' : '—'; }
function fmtTs(iso){
  try{
    const d=new Date(iso);
    return 'Actualizado el '+d.toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'})
      +', '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  }catch{ return iso||'—'; }
}
function esHoy(iso){ try{ return new Date(iso).toDateString()===new Date().toDateString(); }catch{return false;} }
function maxTs(a,b){ try{ return new Date(a)>=new Date(b)?a:b; }catch{ return a||b; } }

// Semáforo: < 60 rojo, 60-79 amarillo, >= 80 verde
function sem(v){
  const n=Number(v);
  if(n>=80) return {c:'var(--green)',  bg:'var(--green-bg)',  cls:'sem-green',  tag:'tag-green',  lbl:'Satisfactorio'};
  if(n>=60) return {c:'var(--yellow)', bg:'var(--yellow-bg)', cls:'sem-yellow', tag:'tag-yellow', lbl:'En riesgo'};
  return         {c:'var(--red)',    bg:'var(--red-bg)',    cls:'sem-red',    tag:'tag-red',    lbl:'Atención'};
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(id, btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='t5' && window._histJC && !window._chartJCReady){
    window._chartJCReady = true;
    setTimeout(()=>iniciarChartJC(window._histJC), 60);
  }
}

// ── Animación de barras ───────────────────────────────────────────────────────
function animateBars(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.bar-fill[data-w]').forEach((el,i)=>{
      setTimeout(()=>{ el.style.width=el.dataset.w; el.style.transition=`width .55s ease ${i*80}ms`; }, 0);
    });
  }));
}

// ═══════════════════════════════════════════════════════════════════════════════
// TAB 1 — Estadísticas Q10
// ═══════════════════════════════════════════════════════════════════════════════
function renderT1(d){
  const t = d.totales||{};

  // KPIs
  const totalAnoms = (d.anomalias||[]).reduce((a,x)=>a+(x.cantidad||0),0);
  const promedioGlobal = (d.por_curso||[]).length
    ? ((d.por_curso||[]).reduce((a,c)=>a+(c.promedio||0),0)/(d.por_curso||[]).length).toFixed(1)
    : null;
  const sg = promedioGlobal != null ? sem(promedioGlobal) : null;

  const kpis = `
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-val">${fmt(t.total_cursos)}</div>
      <div class="kpi-lbl">Cursos activos</div>
      <div class="kpi-sub">En plataforma Q10</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val">${fmt(t.total_habilitados ?? t.total_estudiantes_unicos)}</div>
      <div class="kpi-lbl">Estudiantes activos 2026</div>
      <div class="kpi-sub">de ${fmt(t.total_estudiantes_unicos)} en plataforma este año</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val ${sg?sg.cls:''}">${promedioGlobal!=null?promedioGlobal+'%':'—'}</div>
      <div class="kpi-lbl">Avance promedio global</div>
      <div class="kpi-sub">${sg?`<span class="tag ${sg.tag}">${sg.lbl}</span>`:'—'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val sem-red">${fmt(totalAnoms)}</div>
      <div class="kpi-lbl">Total anomalías</div>
      <div class="kpi-sub">${t.total_db ? fmt(t.total_db)+' en histórico total DB' : 'SIN MATCH + AVANCE 0% + IRREGULAR'}</div>
    </div>
  </div>`;

  // Tabla POR CURSO con semáforo
  const filas = (d.por_curso||[]).map(c=>{
    const s   = sem(c.promedio||0);
    const pct = ((c.promedio||0)/100*100).toFixed(1);
    return `<tr>
      <td>${esc(c.curso)}</td>
      <td class="td-r">${fmt(c.estudiantes)}</td>
      <td style="min-width:160px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="bar-track" style="flex:1;height:8px">
            <div class="bar-fill" data-w="${pct}%" style="background:${s.c}"></div>
          </div>
          <span class="${s.cls}" style="width:40px;text-align:right;font-size:.82rem">${fmtPct(c.promedio)}</span>
        </div>
      </td>
      <td class="td-r" style="color:var(--muted);font-size:.78rem">${fmtPct(c.min)}</td>
      <td class="td-r" style="color:var(--muted);font-size:.78rem">${fmtPct(c.max)}</td>
      <td><span class="tag ${s.tag}">${s.lbl}</span></td>
    </tr>`;
  }).join('');

  const tabla = `
  <div class="card gap">
    <div class="card-title">Avance por curso</div>
    <table class="dt">
      <thead><tr>
        <th>Curso</th><th class="td-r">Estudiantes</th>
        <th>Promedio</th><th class="td-r">Mín</th><th class="td-r">Máx</th><th>Estado</th>
      </tr></thead>
      <tbody>${filas||'<tr><td colspan="6" style="color:var(--muted)">Sin datos</td></tr>'}</tbody>
    </table>
    <p class="chart-note">
      🔴 Atención &lt;60% &nbsp;·&nbsp; 🟡 En riesgo 60–79% &nbsp;·&nbsp; 🟢 Satisfactorio ≥80%
    </p>
  </div>`;

  // Anomalías
  const ANOM_DESC = {
    'NO HABILITADO':    'Estudiantes importados de Q10 con Estado I (inactivo)',
    'SIN MATCH':        'Estudiantes con ID en Q10 pero sin curso asignado — dato incompleto en la extracción',
    'AVANCE 0%':        'Matriculados en curso con avance registrado en cero — nunca abrieron el contenido',
    'AVANCE IRREGULAR': 'Avance superior al 100% — error de sincronización en Q10',
  };
  const anoms = (d.anomalias||[]).map(a=>`
    <div class="anom-card">
      <div class="anom-val">${fmt(a.cantidad)}</div>
      <div class="anom-lbl">${esc(a.categoria)}</div>
      <div class="anom-desc">${esc(ANOM_DESC[a.categoria]||'')}</div>
    </div>`).join('');

  const anomSec = anoms ? `
  <div class="card gap">
    <div class="card-title" style="color:var(--red)">Anomalías detectadas</div>
    <div class="anom-grid">${anoms}</div>
  </div>` : '';

  return kpis + tabla + anomSec;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TAB 2 — Avance Manual
// ═══════════════════════════════════════════════════════════════════════════════
function renderT2(a){
  const t  = a.totales||{};
  const sg = t.promedio_general!=null ? sem(t.promedio_general) : null;

  const kpis = `
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-val">${fmt(t.total_cursos)}</div>
      <div class="kpi-lbl">Cursos registrados</div>
      <div class="kpi-sub">Hoja manual</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val">${fmt(t.estudiantes_unicos_id)}</div>
      <div class="kpi-lbl">Estudiantes únicos</div>
      <div class="kpi-sub">Por número de ID</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val ${sg?sg.cls:''}">${t.promedio_general!=null?t.promedio_general+'%':'—'}</div>
      <div class="kpi-lbl">Promedio general</div>
      <div class="kpi-sub">${sg?`<span class="tag ${sg.tag}">${sg.lbl}</span>`:'Ponderado entre cursos'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val">${fmt(t.total_registros)}</div>
      <div class="kpi-lbl">Total registros</div>
      <div class="kpi-sub">Filas en hoja manual</div>
    </div>
  </div>`;

  const filas = (a.por_curso||[]).map(c=>{
    const s   = sem(c.promedio||0);
    const pct = (c.promedio||0).toFixed(1);
    return `<tr>
      <td>${esc(c.nombre)}</td>
      <td class="td-r">${fmt(c.estudiantes)}</td>
      <td style="min-width:160px">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="bar-track" style="flex:1;height:8px">
            <div class="bar-fill" data-w="${pct}%" style="background:${s.c}"></div>
          </div>
          <span class="${s.cls}" style="width:40px;text-align:right;font-size:.82rem">${fmtPct(c.promedio)}</span>
        </div>
      </td>
      <td class="td-r" style="color:var(--muted);font-size:.78rem">${fmtPct(c.min)}</td>
      <td class="td-r" style="color:var(--muted);font-size:.78rem">${fmtPct(c.max)}</td>
      <td><span class="tag ${s.tag}">${s.lbl}</span></td>
    </tr>`;
  }).join('');

  const tabla = `
  <div class="card gap">
    <div class="card-title">Avance por curso — hoja manual</div>
    <table class="dt">
      <thead><tr>
        <th>Curso</th><th class="td-r">Estudiantes</th>
        <th>Promedio</th><th class="td-r">Mín</th><th class="td-r">Máx</th><th>Estado</th>
      </tr></thead>
      <tbody>${filas||'<tr><td colspan="6" style="color:var(--muted)">Sin datos</td></tr>'}</tbody>
    </table>
    <p class="chart-note">
      🔴 Atención &lt;60% &nbsp;·&nbsp; 🟡 En riesgo 60–79% &nbsp;·&nbsp; 🟢 Satisfactorio ≥80%
    </p>
  </div>`;

  const ANOM_DESC = {
    'SIN PROGRESO':    'Estudiantes con ID registrado pero sin dato de avance — celda vacía en la hoja manual',
    'AVANCE 0%':       'Estudiantes con avance registrado en cero — matriculados sin actividad',
    'AVANCE IRREGULAR':'Porcentaje superior al 100% — posible error de entrada manual',
  };
  const anoms = (a.anomalias||[]).filter(x=>x.cantidad>0).map(x=>`
    <div class="anom-card">
      <div class="anom-val">${fmt(x.cantidad)}</div>
      <div class="anom-lbl">${esc(x.categoria)}</div>
      <div class="anom-desc">${esc(ANOM_DESC[x.categoria]||'')}</div>
    </div>`).join('');

  const anomSec = anoms ? `
  <div class="card gap">
    <div class="card-title" style="color:var(--orange)">Anomalías en hoja manual</div>
    <div class="anom-grid">${anoms}</div>
  </div>` : '';

  const seg = a.segmento ? `<div class="card gap" style="font-size:.85rem;color:var(--muted)">
    Segmento: <strong style="color:var(--text)">${esc(a.segmento)}</strong>
    &nbsp;·&nbsp; Fuente: pestaña "Avance" del registro manual
  </div>` : '';

  return kpis + tabla + anomSec + seg;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TAB 3 — Comparativo
// ═══════════════════════════════════════════════════════════════════════════════
const ALIAS_Q10 = {
  'Bienvenida':              'BIENVENIDOS A JÓVENES CREATIVOS',
  'Hackea Tu Cerebro':       'HACKEA TU CEREBRO: APRENDE EN MENOS TIEMPO Y SIN SUFRIR',
  'Habilidades Esenciales':  'HABILIDADES ESENCIALES PARA SER UN EMPRENDEDOR EXITOSO',
  'Emprendimiento':          'EMPRENDIMIENTO: IDEA DE NEGOCIO JC',
  'IA':                      'INTRODUCCIÓN A LA IA GENERATIVA - 2026',
  'Lógica de Programación':  'FUNDAMENTOS LÓGICA DE PROGRAMACIÓN - 2026',
};

function renderT3(d, a){
  const promediosQ10 = (d?.por_curso||[]).map(c=>c.promedio).filter(v=>v!=null);
  const avgQ10 = promediosQ10.length
    ? (promediosQ10.reduce((x,y)=>x+y,0)/promediosQ10.length).toFixed(1) : null;
  const avgManual = a?.totales?.promedio_general;

  const sq = avgQ10 ? sem(avgQ10) : null;
  const sm = avgManual!=null ? sem(avgManual) : null;
  const resumen = `
  <div class="two-col gap">
    <div class="card col-blue">
      <div class="card-title" style="color:var(--blue)">● Q10 (Plataforma automática)</div>
      <div class="stat-row"><span class="stat-lbl">Estudiantes únicos</span><span class="stat-val" style="color:var(--blue)">${fmt(d?.totales?.total_estudiantes_unicos)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Cursos</span><span class="stat-val">${fmt(d?.totales?.total_cursos)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Promedio general</span>
        <span class="stat-val ${sq?sq.cls:''}">${avgQ10!=null?avgQ10+'%':'—'}</span></div>
    </div>
    <div class="card col-orange">
      <div class="card-title" style="color:var(--orange)">● Hoja Manual (Avance)</div>
      <div class="stat-row"><span class="stat-lbl">Estudiantes únicos</span><span class="stat-val" style="color:var(--orange)">${fmt(a?.totales?.estudiantes_unicos_id)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Cursos</span><span class="stat-val">${fmt(a?.totales?.total_cursos)}</span></div>
      <div class="stat-row"><span class="stat-lbl">Promedio general</span>
        <span class="stat-val ${sm?sm.cls:''}">${avgManual!=null?avgManual+'%':'—'}</span></div>
    </div>
  </div>`;

  const norm = s => s.replace(/ /g, ' ').replace(/\s+/g, ' ').trim();
  const q10Map = {};
  (d?.por_curso||[]).forEach(c=>{ q10Map[norm(c.curso)] = c; });

  const filasCmp = (a?.por_curso||[]).map(c=>{
    const nombreQ10 = ALIAS_Q10[c.nombre] || null;
    const q10       = nombreQ10 ? q10Map[norm(nombreQ10)] : null;
    const pManual   = c.promedio;
    const pQ10      = q10?.promedio ?? null;
    const diff      = (pManual!=null && pQ10!=null) ? (pManual - pQ10).toFixed(1) : null;
    const sm2       = sem(pManual||0);
    const sq2       = pQ10!=null ? sem(pQ10) : null;
    const diffColor = diff==null ? '' : Number(diff)>=0 ? 'color:var(--green)' : 'color:var(--red)';
    const diffStr   = diff==null ? '—' : (Number(diff)>=0?'+':'')+diff+'%';
    return `<tr>
      <td><strong>${esc(c.nombre)}</strong></td>
      <td class="td-r"><span class="${sm2.cls}">${fmtPct(pManual)}</span></td>
      <td class="td-r">${pQ10!=null?`<span class="${sq2.cls}">${fmtPct(pQ10)}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
      <td class="td-r" style="${diffColor};font-weight:700">${diffStr}</td>
      <td class="td-r" style="color:var(--muted);font-size:.78rem">${fmt(c.estudiantes)} / ${q10?fmt(q10.estudiantes):'—'}</td>
    </tr>`;
  }).join('');

  const nombresManual = new Set((a?.por_curso||[]).map(c=>ALIAS_Q10[c.nombre]?norm(ALIAS_Q10[c.nombre]):null).filter(Boolean));
  const soloQ10 = (d?.por_curso||[]).filter(c=>!nombresManual.has(norm(c.curso)));
  const filasExtra = soloQ10.map(c=>{
    const s=sem(c.promedio||0);
    return `<tr style="opacity:.6">
      <td><em>${esc(c.curso)}</em></td>
      <td class="td-r">—</td>
      <td class="td-r"><span class="${s.cls}">${fmtPct(c.promedio)}</span></td>
      <td class="td-r" style="color:var(--muted)">—</td>
      <td class="td-r" style="color:var(--muted);font-size:.78rem">— / ${fmt(c.estudiantes)}</td>
    </tr>`;
  }).join('');

  const tabla = `
  <div class="card gap">
    <div class="card-title">Avance por curso: Manual vs Q10</div>
    <table class="dt">
      <thead><tr>
        <th>Curso</th>
        <th class="td-r">Manual</th>
        <th class="td-r">Q10</th>
        <th class="td-r">Δ Dif.</th>
        <th class="td-r">Est. Manual / Q10</th>
      </tr></thead>
      <tbody>
        ${filasCmp||'<tr><td colspan="5" style="color:var(--muted)">Sin datos de hoja manual</td></tr>'}
        ${filasExtra}
      </tbody>
    </table>
    <p class="chart-note">
      <strong>Δ Dif.</strong> = Manual − Q10 &nbsp;·&nbsp;
      Cursos en gris solo tienen datos en Q10 (no en hoja manual)
    </p>
  </div>`;

  const anoms    = (d?.anomalias||[]);
  const sinMatch = anoms.find(x=>x.categoria==='SIN MATCH');
  const av0      = anoms.find(x=>x.categoria==='AVANCE 0%');
  const irr      = anoms.find(x=>x.categoria==='AVANCE IRREGULAR');
  const totalEst = d?.totales?.total_estudiantes_unicos||1;

  const anomCtx = `
  <div class="card gap">
    <div class="card-title" style="color:var(--red)">Anomalías Q10</div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-val sem-red">${fmt(sinMatch?.cantidad)}</div>
        <div class="metric-lbl">Sin Match</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px">
          ${sinMatch&&totalEst?((sinMatch.cantidad/totalEst)*100).toFixed(1)+'% del total':'—'}<br>
          Sin curso asignado en plataforma
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-val sem-red">${fmt(av0?.cantidad)}</div>
        <div class="metric-lbl">Avance 0%</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px">
          ${av0&&totalEst?((av0.cantidad/totalEst)*100).toFixed(1)+'% del total':'—'}<br>
          Matriculados sin actividad
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-val sem-yellow">${fmt(irr?.cantidad)}</div>
        <div class="metric-lbl">Avance Irregular</div>
        <div style="font-size:.75rem;color:var(--muted);margin-top:4px">
          Avance &gt;100% en Q10
        </div>
      </div>
    </div>
  </div>`;

  const info = `
  <div class="info-box gap">
    <strong>Cruce individual disponible solo en herramienta local</strong><br>
    Para identificar qué estudiante específico tiene discrepancias entre la hoja manual
    y Q10, usar <code>tools/panel_riesgo.py</code> — los datos personales nunca se publican aquí.
  </div>`;

  return resumen + tabla + anomCtx + info;
}

// ═══════════════════════════════════════════════════════════════════════════════
// TAB 4 — Admin (todos los programas)
// ═══════════════════════════════════════════════════════════════════════════════
function renderAdmin(d){
  const jc    = d?.por_curso     || [];
  const mr    = d?.mr?.por_curso || [];
  const stand = d?.stand?.por_curso || [];

  const tJC    = d?.totales              || {};
  const tMR    = d?.mr?.totales          || {};
  const tStand = d?.stand?.totales       || {};

  // ── Tarjetas resumen por programa ──
  const programas = [
    {
      nombre: 'Jóvenes creaTIvos', color: '#406C9E', bg: 'rgba(64,108,158,0.10)',
      cursos: jc, n: tJC.total_estudiantes_unicos || 0,
      etiq: 'JC', icon: '🎓',
    },
    {
      nombre: 'Mujeres ROFÉ', color: '#C12D4C', bg: 'rgba(193,45,76,0.10)',
      cursos: mr, n: tMR.total_estudiantes_unicos || 0,
      etiq: 'MR', icon: '💡',
    },
  ];
  if(stand.length){
    programas.push({
      nombre: 'Stand-by', color: '#8A9BB0', bg: 'rgba(138,155,176,0.12)',
      cursos: stand, n: tStand.total_estudiantes_unicos || 0,
      etiq: 'STAND', icon: '⏸',
    });
  }

  const resumenCards = programas.map(p=>`
    <div class="kpi-card" style="border-top-color:${p.color}">
      <div style="font-size:.7rem;font-weight:700;color:${p.color};margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em">${p.icon} ${esc(p.nombre)}</div>
      <div style="display:flex;gap:18px;align-items:baseline">
        <div>
          <div class="kpi-val" style="color:${p.color}">${fmt(p.n)}</div>
          <div class="kpi-sub">estudiantes únicos</div>
        </div>
        <div>
          <div class="kpi-val" style="color:${p.color};font-size:1.5rem">${fmt(p.cursos.length)}</div>
          <div class="kpi-sub">cursos</div>
        </div>
      </div>
    </div>`).join('');

  const kpiSection = `
  <div class="card">
    <div class="card-title">Resumen por programa</div>
    <div style="display:grid;grid-template-columns:repeat(${programas.length},1fr);gap:12px">
      ${resumenCards}
    </div>
  </div>`;

  // ── Gráfico de barras horizontales — todos los cursos ──
  const allCursos = [
    ...jc.map(c=>({...c, color:'#406C9E', tag:'JC'})),
    ...mr.map(c=>({...c, color:'#C12D4C', tag:'MR'})),
    ...stand.map(c=>({...c, color:'#8A9BB0', tag:'STAND'})),
  ].sort((a,b)=>b.estudiantes - a.estudiantes);

  const maxEst = Math.max(...allCursos.map(c=>c.estudiantes), 1);
  const filasBar = allCursos.map(c=>{
    const pct = ((c.estudiantes / maxEst)*100).toFixed(1);
    const promColor = c.promedio>=80 ? '#6EA050' : c.promedio>=60 ? '#B89500' : '#C12D4C';
    return `
    <div class="bar-row" style="grid-template-columns:240px 1fr 110px">
      <div class="bar-lbl" title="${esc(c.curso)}">${esc(c.curso)}</div>
      <div class="bar-track">
        <div class="bar-fill" data-w="${pct}%" style="background:${c.color}"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
        <span style="font-size:.78rem;color:var(--muted);min-width:36px;text-align:right">${fmt(c.estudiantes)}</span>
        <span style="font-size:.72rem;font-weight:700;padding:1px 7px;border-radius:4px;background:${c.color}1A;color:${c.color}">${esc(c.tag)}</span>
        <span style="font-size:.78rem;font-weight:700;color:${promColor};min-width:38px;text-align:right">${fmtPct(c.promedio)}</span>
      </div>
    </div>`;
  }).join('');

  const chartSection = `
  <div class="card gap">
    <div class="card-title">Estudiantes por curso — todos los programas</div>
    ${filasBar || '<p style="color:var(--muted)">Sin datos</p>'}
    <p class="chart-note" style="margin-top:16px">
      Longitud de barra = nº de estudiantes (relativo al máximo) &nbsp;·&nbsp;
      Porcentaje = avance promedio Q10 &nbsp;·&nbsp;
      <span style="color:#406C9E;font-weight:700">■ JC</span> &nbsp;
      <span style="color:#C12D4C;font-weight:700">■ MR</span>
      ${stand.length ? '&nbsp;<span style="color:#8A9BB0;font-weight:700">■ Stand-by</span>' : ''}
    </p>
  </div>`;

  const nota = `
  <div class="info-box gap">
    <strong>¿Cómo agregar o mover un curso?</strong><br>
    Los programas se clasifican en <code>tools/course_config.json</code> (local) usando el panel Admin del GUI de riesgo.
    Los cambios se reflejan aquí al próximo <em>export_stats.py</em>.
  </div>`;

  return kpiSection + chartSection + nota;
}

// TAB 5 — Tendencia histórica JC
// ═══════════════════════════════════════════════════════════════════════════════
function renderT5(hist) {
  if (!hist || hist.length < 2) {
    const n = hist?.length||0;
    const msg = n===0
      ? 'No hay historial aún. Ejecuta <code>bootstrap_history.py</code> y haz push para poblar el historial desde git.'
      : `Hay 1 snapshot guardado (${hist[0].fecha}). Con el próximo registro automático (~4 días) aparecerá la gráfica.`;
    return `<div class="card gap"><div class="card-title">📈 Tendencia histórica — Jóvenes creaTIvos</div><div class="info-box">${msg}</div></div>`;
  }

  const ul = hist[hist.length-1], pr = hist[0];
  const delta = (ul.jc.promedio_global - pr.jc.promedio_global).toFixed(1);
  const dc = Number(delta)>=0 ? 'var(--green)' : 'var(--red)';
  const ds = (Number(delta)>=0?'+':'')+delta+'%';

  return `
  <div class="card gap">
    <div class="card-title">📈 Tendencia histórica — Jóvenes creaTIvos</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;border-top:3px solid var(--primary)">
        <div style="font-size:1.6rem;font-weight:700;color:var(--primary)">${fmtPct(ul.jc.promedio_global)}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;font-weight:600">Último promedio global</div>
        <div style="font-size:.72rem;color:var(--muted)">${ul.fecha}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;border-top:3px solid ${dc}">
        <div style="font-size:1.6rem;font-weight:700;color:${dc}">${ds}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;font-weight:600">Δ desde el primer registro</div>
        <div style="font-size:.72rem;color:var(--muted)">${pr.fecha} → ${ul.fecha}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;border-top:3px solid var(--muted)">
        <div style="font-size:1.6rem;font-weight:700;color:var(--text)">${hist.length}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;font-weight:600">Snapshots registrados</div>
        <div style="font-size:.72rem;color:var(--muted)">Cada ~4 días</div>
      </div>
    </div>
    <div style="position:relative;height:300px"><canvas id="chart-jc"></canvas></div>
    <p class="chart-note" style="margin-top:10px">
      Línea azul sólida = promedio global ponderado &nbsp;·&nbsp;
      Clic en leyenda para mostrar/ocultar cursos individuales
    </p>
  </div>`;
}

function iniciarChartJC(hist) {
  const canvas = document.getElementById('chart-jc');
  if (!canvas || typeof Chart==='undefined') return;

  const labels = hist.map(h=>{
    const d = new Date(h.fecha+'T12:00:00');
    return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
  });

  const names = [...new Set(hist.flatMap(h=>(h.jc?.por_curso||[]).map(c=>c.curso)))];
  const pal   = ['#6FA0BC','#D1793F','#6EA050','#EEC935','#9B59B6','#8A9BB0','#16A085','#E74C3C'];

  new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Promedio global JC',
          data: hist.map(h=>h.jc?.promedio_global??null),
          borderColor: '#406C9E', backgroundColor: 'rgba(64,108,158,0.08)',
          borderWidth: 3, pointRadius: 5, pointBackgroundColor: '#406C9E',
          fill: true, tension: 0.3, order: 0,
        },
        ...names.map((n,i)=>({
          label: n.length>45 ? n.slice(0,45)+'…' : n,
          data: hist.map(h=>{ const c=(h.jc?.por_curso||[]).find(c=>c.curso===n); return c?c.promedio:null; }),
          borderColor: pal[i%pal.length], borderWidth:1.5, borderDash:[5,3],
          pointRadius:3, fill:false, tension:0.3, hidden:true, order:i+1,
        })),
      ],
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins:{
        legend:{ position:'bottom', labels:{ font:{size:11}, usePointStyle:true, padding:14 } },
        tooltip:{ callbacks:{ label:ctx=>` ${ctx.dataset.label}: ${ctx.raw!=null?ctx.raw.toFixed(1)+'%':'—'}` } },
      },
      scales:{
        y:{ min:0, max:100, ticks:{callback:v=>v+'%',font:{size:11}}, grid:{color:'rgba(64,108,158,0.06)'} },
        x:{ ticks:{font:{size:11}}, grid:{display:false} },
      },
    },
  });
}

  window._histJC = hist;

  document.getElementById('loading').style.display = 'none';

  if(!dash && !asist){
    document.getElementById('t1').classList.add('active');
    document.getElementById('t1').innerHTML = `<div class="error-box"><strong>No se pudieron cargar los datos</strong>Verifica que data.json y ../avance/data.json existen.</div>`;
    return;
  }

  renderHeader(dash?.ultima_actualizacion, asist?.ultima_actualizacion, asist?.segmento);

  const warns = [];
  if(!dash)  warns.push('<div class="error-box" style="margin-bottom:14px"><strong>No se cargó dashboard/data.json</strong>Corre export_stats.py primero.</div>');
  if(!asist) warns.push('<div class="error-box" style="margin-bottom:14px"><strong>No se cargó avance/data.json</strong>Corre export_avance.py primero.</div>');
  const wHtml = warns.join('');

  document.getElementById('t1').innerHTML = wHtml + (dash  ? renderT1(dash)  : '<p style="color:var(--muted);padding:24px">Sin datos Q10.</p>');
  document.getElementById('t2').innerHTML = wHtml + (asist ? renderT2(asist) : '<p style="color:var(--muted);padding:24px">Sin datos de avance.</p>');
  document.getElementById('t3').innerHTML = wHtml + renderT3(dash, asist);
  document.getElementById('t4').innerHTML = wHtml + (dash  ? renderAdmin(dash) : '<p style="color:var(--muted);padding:24px">Sin datos Q10.</p>');
  document.getElementById('t5').innerHTML = renderT5(hist);

  document.getElementById('t1').classList.add('active');
  animateBars();

  document.getElementById('footer-root').innerHTML = `
  <footer>
    <img src="../img/logo_rofe_aplicacion2.png" alt="Fundación ROFÉ"
         class="footer-logo" onerror="this.style.display='none'">
    <div class="footer-eslogan">-Impulsamos ideas de impacto social-</div>
    <div class="footer-mision">Si quieres cambiar el mundo, toca una vida</div>
    <div class="footer-copy">Generado automáticamente desde Google Sheets · ${esc(asist?.segmento||'ROFÉ Jóvenes creaTIvos')}</div>
  </footer>`;
});
</script>
</body>
</html>
