<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aprobación por Curso — Jóvenes creaTIvos · Fundación ROFÉ</title>
  <link rel="icon" href="../img/logo_rofe_aplicacion2.png" type="image/png">
  <style>
    /* ── Variables de marca — acento verde para Aprobación ── */
    :root {
      --primary:    #406C9E;
      --primary-bg: rgba(64,108,158,0.10);
      --green:      #6EA050;
      --green-bg:   rgba(110,160,80,0.12);
      --green-dark: #4E7A36;
      --amber:      #B8860B;   /* sin completar — validado 3:1 sobre blanco */
      --amber-bg:   rgba(184,134,11,0.12);
      --red:        #C12D4C;
      --red-bg:     rgba(193,45,76,0.10);
      --orange:     #D1793F;
      --blue-ret:   #3A6FB8;   /* aprobó y se retiró — azul marca con croma validado */

      --bg:         #FFFFFF;
      --surface:    #FBF6F2;
      --border:     #EBDDD2;
      --text:       #1A2535;
      --muted:      #6B7A94;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Gilroy', 'Century Gothic', 'Trebuchet MS', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      border-bottom: 3px solid var(--green);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .header-logo   { height: 54px; width: auto; flex-shrink: 0; object-fit: contain; }
    .brand-block   { flex-shrink: 0; }
    .brand-name    { font-size: 1rem; font-weight: 700; color: var(--green-dark); letter-spacing: .01em; }
    .brand-eslogan { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-style: italic; }
    .hd-meta       { flex: 1; min-width: 0; }
    .hd-seg        { font-size: 0.8rem; color: var(--text); font-weight: 600; }
    .hd-upd        { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .back-link {
      display: flex; align-items: center; gap: 6px;
      font-size: .78rem; font-weight: 700; color: var(--primary);
      text-decoration: none; padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--primary-bg); background: var(--primary-bg);
      white-space: nowrap;
    }

    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 56px; }
    .gap { margin-top: 24px; }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 1px 4px rgba(110,160,80,0.08);
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--green-dark); margin-bottom: 18px;
    }

    /* ── KPIs ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 18px;
      border-top: 3px solid var(--green);
    }
    .kpi-val { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--green-dark); }
    .kpi-lbl { font-size: 0.8rem; font-weight: 600; margin-top: 7px; color: var(--text); }
    .kpi-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    /* ── Leyenda ── */
    .legend { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 16px; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: .78rem; color: var(--text); }
    .legend-dot  { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    /* ── Fila de curso: barra apilada 100% ── */
    .curso-grupo   { margin-bottom: 6px; }
    .grupo-titulo  {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted);
      margin: 18px 0 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    .curso-row { margin-bottom: 16px; }
    .curso-head { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
    .curso-nom  { font-size: .85rem; font-weight: 600; }
    .curso-pct  { font-size: .85rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--green-dark); }
    .curso-n    { font-size: .74rem; color: var(--muted); }
    .badge {
      font-size: .64rem; font-weight: 700; padding: 2px 9px; border-radius: 10px;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-fin   { background: var(--green-bg); color: var(--green-dark); }
    .badge-curso { background: var(--amber-bg); color: var(--amber); }

    .stack {
      display: flex; height: 22px; border-radius: 4px; overflow: hidden;
      background: var(--border); gap: 2px;   /* separador de 2px entre segmentos */
    }
    .seg { height: 100%; min-width: 0; width: 0; position: relative; cursor: default; }
    .seg-aprobado { background: var(--green); border-radius: 4px 0 0 4px; }
    .seg-aprobret { background: var(--blue-ret); }
    .seg-sinfin   { background: var(--amber); }
    .seg-retirado { background: var(--red); border-radius: 0 4px 4px 0; }
    .seg:hover { filter: brightness(1.12); }

    /* tooltip */
    #tip {
      position: fixed; z-index: 50; pointer-events: none; display: none;
      background: var(--text); color: #fff; font-size: .74rem;
      padding: 6px 10px; border-radius: 6px; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }

    /* ── Tabla ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    th, td { padding: 8px 10px; text-align: right; white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; white-space: normal; }
    thead th {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); border-bottom: 2px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: var(--surface); }
    td { font-variant-numeric: tabular-nums; }
    .num-verde { color: var(--green-dark); font-weight: 700; }
    .num-azul  { color: var(--blue-ret); font-weight: 700; }
    .num-rojo  { color: var(--red); }

    /* ── Info / Error ── */
    .info-box {
      background: var(--primary-bg);
      border: 1px solid var(--primary);
      border-radius: 8px; padding: 14px 18px; font-size: .82rem; color: var(--muted);
    }
    .info-box strong { color: var(--primary); }
    .chart-note { font-size: .76rem; color: var(--muted); margin-top: 14px; }
    .error-box {
      background: var(--red-bg); border: 1px solid var(--red);
      border-radius: 8px; padding: 18px 22px; color: var(--red); margin-top: 24px;
    }
    .error-box strong { display: block; margin-bottom: 4px; }
    .skel {
      background: linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);
      background-size: 200% 100%; animation: shim 1.5s infinite; border-radius: 4px;
    }
    @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 3px solid var(--green);
      text-align: center;
      padding: 28px 16px 24px;
    }
    .footer-logo    { height: 44px; width: auto; object-fit: contain; margin-bottom: 10px; }
    .footer-eslogan { font-size: .85rem; font-weight: 700; color: var(--green-dark); letter-spacing: .04em; margin-bottom: 4px; }
    .footer-mision  { font-size: .8rem; font-style: italic; color: var(--muted); margin-bottom: 12px; }
    .footer-copy    { font-size: .72rem; color: var(--muted); }

    @media (max-width: 768px) {
      header       { padding: 12px 14px; }
      .header-logo { height: 40px; }
      main         { padding: 16px 12px 40px; }
      .kpi-grid    { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div id="header-root">
  <div style="height:72px;background:var(--bg);border-bottom:3px solid var(--green)"></div>
</div>

<main>
  <div id="loading">
    <div class="skel" style="height:100px;margin-bottom:14px"></div>
    <div class="skel" style="height:280px;margin-bottom:14px"></div>
    <div class="skel" style="height:200px"></div>
  </div>
  <div id="content"></div>
</main>

<div id="footer-root"></div>
<div id="tip"></div>

<script>
function esc(s){ return String(s??'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return n!=null ? Number(n).toLocaleString('es-CO') : '—'; }
function fmtTs(iso){
  try{
    const d=new Date(iso);
    return 'Actualizado el '+d.toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'})
      +', '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  }catch{ return iso||'—'; }
}

function animateSegs(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.seg[data-w]').forEach((el,i)=>{
      setTimeout(()=>{ el.style.width=el.dataset.w; el.style.transition=`width .55s ease ${i*35}ms`; }, 0);
    });
  }));
}

/* Barra apilada 100% de un curso: aprobados | aprobó y se retiró | sin completar | retirados */
function cursoRow(c){
  const total = c.cursaron || 1;
  const segs = [
    { k:'aprobado', n:c.aprobados,               lbl:'Aprobaron y siguen activos (avance ≥ 100)' },
    { k:'aprobret', n:c.aprobados_retirados ?? 0, lbl:'Aprobaron y luego se retiraron' },
    { k:'sinfin',   n:c.sin_finalizar,           lbl: c.finalizado ? 'No completaron el curso' : 'Aún cursando (avance < 100)' },
    { k:'retirado', n:c.retirados,               lbl:'Se retiraron sin aprobar' },
  ].filter(s=>s.n>0);

  const html = segs.map(s=>{
    const pct = (s.n/total*100);
    return `<div class="seg seg-${s.k}" data-w="${pct.toFixed(2)}%"
      data-tip="${esc(s.lbl)}: ${fmt(s.n)} de ${fmt(c.cursaron)} (${pct.toFixed(1)}%)"></div>`;
  }).join('');

  const badge = c.finalizado
    ? '<span class="badge badge-fin">✓ Finalizado</span>'
    : '<span class="badge badge-curso">En curso</span>';

  return `
  <div class="curso-row">
    <div class="curso-head">
      <span class="curso-nom">${esc(c.curso)}</span>
      ${badge}
      <span class="curso-pct">${c.pct_aprobados}% aprobó</span>
      <span class="curso-n">· ${fmt(c.cursaron)} lo cursaron</span>
    </div>
    <div class="stack">${html}</div>
  </div>`;
}

const PROGRAMA = 'Jóvenes creaTIvos';   // este panel muestra solo JC

function render(d){
  const t = d.totales||{};
  // Datos solo de Jóvenes creaTIvos
  const cursos = (d.por_curso||[]).filter(c=>(c.programa||'')===PROGRAMA);
  const pJC = (d.por_programa||[]).find(p=>p.programa===PROGRAMA) || {};
  const pctGlobal = pJC.pct_aprobados != null ? pJC.pct_aprobados
    : (pJC.cursaron ? (100*pJC.aprobados/pJC.cursaron).toFixed(1) : '—');

  const kpis = `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-top-color:var(--primary)">
      <div class="kpi-val" style="color:var(--primary)">${fmt(pJC.estudiantes_cohorte ?? t.estudiantes_cohorte_2026)}</div>
      <div class="kpi-lbl">Estudiantes ${esc(d.anio)}</div>
      <div class="kpi-sub">Cohorte completa: habilitados + inhabilitados</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-val">${pctGlobal}%</div>
      <div class="kpi-lbl">Aprobación global</div>
      <div class="kpi-sub">${fmt(pJC.aprobados)} matrículas con avance ≥ 100${
        pJC.aprobados_retirados ? ` (incluye ${fmt(pJC.aprobados_retirados)} de retirados)` : ''}</div>
    </div>
    <div class="kpi-card" style="border-top-color:var(--red)">
      <div class="kpi-val" style="color:var(--red)">${fmt(pJC.retirados_unicos ?? t.total_retirados_2026)}</div>
      <div class="kpi-lbl">Retirados ${esc(d.anio)}</div>
      <div class="kpi-sub">Estudiantes inhabilitados de la cohorte</div>
    </div>
  </div>`;

  const legend = `
  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Aprobaron (≥ 100)</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--blue-ret)"></span>Aprobaron y se retiraron</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>Sin completar</span>
    <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>Retirados sin aprobar</span>
  </div>`;

  const grupos = `
    <div class="curso-grupo">
      <div class="grupo-titulo">${esc(PROGRAMA)} — ${cursos.length} curso${cursos.length!==1?'s':''}</div>
      ${cursos.map(cursoRow).join('')}
    </div>`;

  const barras = `
  <div class="card gap">
    <div class="card-title">¿Qué porcentaje aprobó cada curso?</div>
    ${legend}
    ${grupos}
    <p class="chart-note">
      Se aprueba únicamente con avance de 100 o más (hay casos de 101 por actividades extra).
      En cursos <strong>finalizados</strong> el % es definitivo; en cursos <strong>en curso</strong>,
      "sin completar" son estudiantes que aún están avanzando.
      <strong>Aprobaron y se retiraron</strong>: estudiantes que alcanzaron el 100 en este curso
      y después fueron inhabilitados (Q10 inhabilita todas las matrículas a la vez) —
      su logro cuenta en el % de aprobación sin importar cuántas actualizaciones pasen.
    </p>
  </div>`;

  const filas = cursos.map(c=>`
    <tr>
      <td>${esc(c.curso)}</td>
      <td>${fmt(c.cursaron)}</td>
      <td class="num-verde">${fmt(c.aprobados_total ?? c.aprobados)}</td>
      <td class="num-azul">${fmt(c.aprobados_retirados ?? 0)}</td>
      <td>${fmt(c.sin_finalizar)}</td>
      <td class="num-rojo">${fmt(c.retirados)}</td>
      <td class="num-verde">${c.pct_aprobados}%</td>
      <td>${c.finalizado?'✓ Finalizado':'En curso'}</td>
    </tr>`).join('');
  const tabla = `
  <div class="card gap">
    <div class="card-title">Detalle por curso</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Curso</th><th>Cursaron</th><th>Aprobaron (total)</th>
          <th>· de ellos, retirados</th><th>Sin completar</th><th>Retirados sin aprobar</th>
          <th>% Aprobó</th><th>Estado</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
  </div>`;

  const info = `
  <div class="info-box gap">
    <strong>¿Cómo se calcula?</strong><br>
    ${esc(d.nota_metodo)}
    A diferencia de otros paneles, aquí la cohorte incluye a los estudiantes
    <em>inhabilitados</em> (retirados) del ${esc(d.anio)}, por lo que el % de aprobación
    refleja a todos los que cursaron, no solo a los activos hoy.
    Este panel muestra únicamente el programa ${esc(PROGRAMA)}.
    Solo se publican cifras agregadas — nunca datos personales.
  </div>`;

  return kpis + barras + tabla + info;
}

function renderHeader(ts){
  document.getElementById('header-root').innerHTML = `
  <header>
    <img src="../img/logo_rofe_aplicacion2.png" alt="Fundación ROFÉ"
         class="header-logo" onerror="this.style.display='none'">
    <div class="brand-block">
      <div class="brand-name">Aprobación por Curso</div>
      <div class="brand-eslogan">Cohorte completa · habilitados + inhabilitados</div>
    </div>
    <div class="hd-meta">
      <div class="hd-seg">Fundación ROFÉ — Jóvenes creaTIvos</div>
      <div class="hd-upd">${fmtTs(ts)}</div>
    </div>
    <a class="back-link" href="../dashboard/">← Dashboard</a>
  </header>`;
}

/* tooltip que sigue al cursor sobre los segmentos */
const tip = document.getElementById('tip');
document.addEventListener('mousemove', e=>{
  const seg = e.target.closest('.seg[data-tip]');
  if(seg){
    tip.textContent = seg.dataset.tip;
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX+12, innerWidth-tip.offsetWidth-8)+'px';
    tip.style.top  = (e.clientY+14)+'px';
  } else {
    tip.style.display = 'none';
  }
});

fetch('./data.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d=>{
    document.getElementById('loading').style.display = 'none';
    renderHeader(d.ultima_actualizacion);
    document.getElementById('content').innerHTML = render(d);
    animateSegs();
    document.getElementById('footer-root').innerHTML = `
    <footer>
      <img src="../img/logo_rofe_aplicacion2.png" alt="Fundación ROFÉ"
           class="footer-logo" onerror="this.style.display='none'">
      <div class="footer-eslogan">-Impulsamos ideas de impacto social-</div>
      <div class="footer-mision">Si quieres cambiar el mundo, toca una vida</div>
      <div class="footer-copy">Generado automáticamente desde Q10 · Consolidado virtual × Matriculados × Retirados</div>
    </footer>`;
  })
  .catch(()=>{
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML =
      `<div class="error-box"><strong>No se pudieron cargar los datos</strong>
       Verifica que data.json existe — corre export_aprobacion.py primero.</div>`;
  });
</script>
</body>
</html>
