<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirados — Jóvenes creaTIvos · Fundación ROFÉ</title>
  <link rel="icon" href="../img/logo_rofe_aplicacion2.png" type="image/png">
  <style>
    /* ── Variables de marca — acento naranja para Retirados ── */
    :root {
      --primary:    #406C9E;
      --primary-bg: rgba(64,108,158,0.10);
      --orange:     #D1793F;
      --orange-bg:  rgba(209,121,63,0.12);
      --orange-dark:#A85A28;
      --yellow:     #EEC935;
      --yellow-bg:  rgba(238,201,53,0.14);
      --red:        #C12D4C;
      --red-bg:     rgba(193,45,76,0.10);
      --green:      #6EA050;
      --green-bg:   rgba(110,160,80,0.12);

      --bg:         #FFFFFF;
      --surface:    #FBF6F2;
      --border:     #EBDDD2;
      --text:       #1A2535;
      --muted:      #6B7A94;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Gilroy', 'Century Gothic', 'Trebuchet MS', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--bg);
      border-bottom: 3px solid var(--orange);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .header-logo   { height: 54px; width: auto; flex-shrink: 0; object-fit: contain; }
    .brand-block   { flex-shrink: 0; }
    .brand-name    { font-size: 1rem; font-weight: 700; color: var(--orange); letter-spacing: .01em; }
    .brand-eslogan { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-style: italic; }
    .hd-meta       { flex: 1; min-width: 0; }
    .hd-seg        { font-size: 0.8rem; color: var(--text); font-weight: 600; }
    .hd-upd        { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .back-link {
      display: flex; align-items: center; gap: 6px;
      font-size: .78rem; font-weight: 700; color: var(--primary);
      text-decoration: none; padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--primary-bg); background: var(--primary-bg);
      white-space: nowrap;
    }

    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 56px; }
    .gap { margin-top: 24px; }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 1px 4px rgba(209,121,63,0.08);
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--orange-dark); margin-bottom: 18px;
    }

    /* ── KPIs ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 18px;
      border-top: 3px solid var(--orange);
    }
    .kpi-val { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--orange-dark); }
    .kpi-lbl { font-size: 0.8rem; font-weight: 600; margin-top: 7px; color: var(--text); }
    .kpi-sub { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

    /* ── Barras ── */
    .bar-row  { display: grid; grid-template-columns: 190px 1fr 90px; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-lbl  { font-size: .82rem; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track{ background: var(--border); border-radius: 4px; height: 22px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; width: 0; }
    .bar-cnt  { font-size: .82rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Info / Error ── */
    .info-box {
      background: var(--primary-bg);
      border: 1px solid var(--primary);
      border-radius: 8px; padding: 14px 18px; font-size: .82rem; color: var(--muted);
    }
    .info-box strong { color: var(--primary); }
    .chart-note { font-size: .76rem; color: var(--muted); margin-top: 14px; }
    .error-box {
      background: var(--red-bg); border: 1px solid var(--red);
      border-radius: 8px; padding: 18px 22px; color: var(--red); margin-top: 24px;
    }
    .error-box strong { display: block; margin-bottom: 4px; }
    .skel {
      background: linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);
      background-size: 200% 100%; animation: shim 1.5s infinite; border-radius: 4px;
    }
    @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      border-top: 3px solid var(--orange);
      text-align: center;
      padding: 28px 16px 24px;
    }
    .footer-logo    { height: 44px; width: auto; object-fit: contain; margin-bottom: 10px; }
    .footer-eslogan { font-size: .85rem; font-weight: 700; color: var(--orange-dark); letter-spacing: .04em; margin-bottom: 4px; }
    .footer-mision  { font-size: .8rem; font-style: italic; color: var(--muted); margin-bottom: 12px; }
    .footer-copy    { font-size: .72rem; color: var(--muted); }

    @media (max-width: 768px) {
      header       { padding: 12px 14px; }
      .header-logo { height: 40px; }
      main         { padding: 16px 12px 40px; }
      .kpi-grid    { grid-template-columns: 1fr 1fr; }
      .bar-row     { grid-template-columns: 110px 1fr 70px; }
    }
  </style>
</head>
<body>

<div id="header-root">
  <div style="height:72px;background:var(--bg);border-bottom:3px solid var(--orange)"></div>
</div>

<main>
  <div id="loading">
    <div class="skel" style="height:100px;margin-bottom:14px"></div>
    <div class="skel" style="height:220px;margin-bottom:14px"></div>
    <div class="skel" style="height:160px"></div>
  </div>
  <div id="content"></div>
</main>

<div id="footer-root"></div>

<script>
function esc(s){ return String(s??'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return n!=null ? Number(n).toLocaleString('es-CO') : '—'; }
function fmtTs(iso){
  try{
    const d=new Date(iso);
    return 'Actualizado el '+d.toLocaleDateString('es-CO',{year:'numeric',month:'long',day:'numeric'})
      +', '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  }catch{ return iso||'—'; }
}
function fmtMes(m){
  if(!m || m==='sin fecha') return 'Sin fecha';
  try{
    const d=new Date(m+'-15T12:00:00');
    const s=d.toLocaleDateString('es-CO',{month:'short',year:'numeric'});
    return s.charAt(0).toUpperCase()+s.slice(1);
  }catch{ return m; }
}

function animateBars(){
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.bar-fill[data-w]').forEach((el,i)=>{
      setTimeout(()=>{ el.style.width=el.dataset.w; el.style.transition=`width .55s ease ${i*60}ms`; }, 0);
    });
  }));
}

function barSection(titulo, items, labelKey, color, nota){
  if(!items || !items.length) return '';
  const total = items.reduce((a,x)=>a+(x.cantidad||0),0) || 1;
  const maxN  = Math.max(...items.map(x=>x.cantidad||0), 1);
  const filas = items.map(x=>{
    const pct = ((x.cantidad||0)/maxN*100).toFixed(1);
    const share = ((x.cantidad||0)/total*100).toFixed(1);
    return `
    <div class="bar-row">
      <div class="bar-lbl" title="${esc(x[labelKey])}">${esc(x[labelKey])}</div>
      <div class="bar-track"><div class="bar-fill" data-w="${pct}%" style="background:${color}"></div></div>
      <div class="bar-cnt">${fmt(x.cantidad)} · ${share}%</div>
    </div>`;
  }).join('');
  return `
  <div class="card gap">
    <div class="card-title">${titulo}</div>
    ${filas}
    ${nota?`<p class="chart-note">${nota}</p>`:''}
  </div>`;
}

function render(d){
  const t = d.totales||{};

  const kpis = `
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-val">${fmt(t.total_retirados)}</div>
      <div class="kpi-lbl">Total retirados</div>
      <div class="kpi-sub">Histórico completo en Q10</div>
    </div>
    <div class="kpi-card" style="border-top-color:var(--red)">
      <div class="kpi-val" style="color:var(--red)">${fmt(t.cancelados)}</div>
      <div class="kpi-lbl">Cancelados</div>
      <div class="kpi-sub">Estado "Cancelado" en Q10</div>
    </div>
    <div class="kpi-card" style="border-top-color:var(--yellow)">
      <div class="kpi-val" style="color:#8A6E00">${fmt(t.desertores)}</div>
      <div class="kpi-lbl">Desertores</div>
      <div class="kpi-sub">Abandono sin cancelación formal</div>
    </div>
    <div class="kpi-card" style="border-top-color:var(--primary)">
      <div class="kpi-val" style="color:var(--primary)">${fmt(t.aplazados)}</div>
      <div class="kpi-lbl">Aplazados</div>
      <div class="kpi-sub">Retiro temporal</div>
    </div>
  </div>`;

  const tipos = barSection('Distribución por tipo de retiro', d.por_tipo, 'tipo', 'var(--orange)');
  const causas = barSection('Causas de cancelación', d.por_causa, 'causa', 'var(--red)',
    'Causa registrada en Q10 al momento del retiro');
  const programas = barSection('Retirados por programa', d.por_programa, 'programa', 'var(--primary)');

  const meses = (d.por_mes||[]).map(m=>({...m, mes: fmtMes(m.mes)}));
  const tendencia = barSection('Retiros por mes', meses, 'mes', 'var(--orange-dark)',
    'Según fecha de cancelación registrada en Q10');

  const info = `
  <div class="info-box gap">
    <strong>Datos individuales disponibles solo en herramienta local</strong><br>
    Este panel muestra únicamente cifras agregadas. El detalle por estudiante
    (nombres, identificaciones, descripción del retiro) se consulta en el
    panel local <code>tools/panel_riesgo_gui.py</code> — los datos personales nunca se publican aquí.
  </div>`;

  return kpis + tipos + causas + programas + tendencia + info;
}

function renderHeader(ts){
  document.getElementById('header-root').innerHTML = `
  <header>
    <img src="../img/logo_rofe_aplicacion2.png" alt="Fundación ROFÉ"
         class="header-logo" onerror="this.style.display='none'">
    <div class="brand-block">
      <div class="brand-name">Panel de Retirados</div>
      <div class="brand-eslogan">Cancelados · Desertores · Aplazados</div>
    </div>
    <div class="hd-meta">
      <div class="hd-seg">Fundación ROFÉ — Jóvenes creaTIvos</div>
      <div class="hd-upd">${fmtTs(ts)}</div>
    </div>
    <a class="back-link" href="../dashboard/">← Dashboard</a>
  </header>`;
}

fetch('./data.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(d=>{
    document.getElementById('loading').style.display = 'none';
    renderHeader(d.ultima_actualizacion);
    document.getElementById('content').innerHTML = render(d);
    animateBars();
    document.getElementById('footer-root').innerHTML = `
    <footer>
      <img src="../img/logo_rofe_aplicacion2.png" alt="Fundación ROFÉ"
           class="footer-logo" onerror="this.style.display='none'">
      <div class="footer-eslogan">-Impulsamos ideas de impacto social-</div>
      <div class="footer-mision">Si quieres cambiar el mundo, toca una vida</div>
      <div class="footer-copy">Generado automáticamente desde Google Sheets · Reporte Estudiantes cancelados Q10</div>
    </footer>`;
  })
  .catch(()=>{
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').innerHTML =
      `<div class="error-box"><strong>No se pudieron cargar los datos</strong>
       Verifica que data.json existe — corre export_retirados.py primero.</div>`;
  });
</script>
</body>
</html>
