<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ASUNTO</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f7; font-family:'Segoe UI', Arial, Helvetica, sans-serif; color:#333333;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08);">

          <!-- Banner superior (Imagen Header) -->
          <tr>
            <td align="center" style="padding:0;">
              <img src="cid:banner" alt="$TITULO_EVENTO" width="600" style="display:block; width:100%; max-width:600px; height:auto; border:0;">
            </td>
          </tr>

          <!-- Cuerpo principal -->
          <tr>
            <td style="padding:28px 32px 8px 32px; font-size:15px; line-height:1.6; color:#333333;">
              <p style="margin:0 0 16px 0;">Hola $NOMBRE 💙</p>

              <p style="margin:0 0 16px 0;">$PARRAFO_INTRO</p>

              <!-- Datos del evento (bloque destacado) -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:8px 0 20px 0; background-color:#eef3f9; border-left:4px solid #406C9E; border-radius:4px;">
                <tr>
                  <td style="padding:16px 20px; font-size:15px; line-height:1.8; color:#333333;">
                    $DATOS_EVENTO
                  </td>
                </tr>
              </table>

              <!-- Párrafo descriptivo -->
              <p style="margin:0 0 16px 0;">$PARRAFO_DESCRIPCION</p>

              <!-- Botón CTA -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 20px 0;">
                <tr>
                  <td align="center" bgcolor="#406C9E" style="border-radius:6px;">
                    <a href="$URL_CTA"
                       style="display:inline-block; padding:12px 28px; font-size:15px; font-weight:bold; color:#ffffff; text-decoration:none;">
                       $TEXTO_CTA
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Párrafo cierre -->
              <p style="margin:0 0 16px 0;">$PARRAFO_CIERRE</p>

              <p style="margin:0 0 4px 0;">Saludos,</p>
              <p style="margin:0 0 8px 0;"><strong>$FIRMA</strong></p>
            </td>
          </tr>

          <tr><td style="padding:0 32px 24px 32px;"></td></tr>

        </table>

        <!-- Pie con disclaimer -->
        <p style="margin:16px 0 0 0; font-size:11px; color:#999999; max-width:600px;">
          Recibes este correo por tu vínculo con Jóvenes creaTIvos. Si no deseas recibir más comunicaciones, responde a este correo con el asunto "Baja".
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
